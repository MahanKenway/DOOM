name: Build DOOM WASM & Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages:    write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Cache Emscripten SDK
      id: cache-emsdk
      uses: actions/cache@v4
      with:
        path: emsdk
        key: emsdk-3.1.51

    - name: Install Emscripten SDK
      if: steps.cache-emsdk.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/emscripten-core/emsdk.git
        ./emsdk/emsdk install 3.1.51
        ./emsdk/emsdk activate 3.1.51

    - name: Add emcc to PATH
      run: echo "$GITHUB_WORKSPACE/emsdk/upstream/emscripten" >> $GITHUB_PATH

    - name: Download Freedoom WAD
      run: |
        mkdir -p dist/assets
        curl -sL "https://github.com/freedoom/freedoom/releases/download/v0.13.0/freedoom-0.13.0.zip" -o freedoom.zip
        unzip -j freedoom.zip "*/freedoom1.wad" -d dist/assets/

    - name: Compile DOOM → WASM
      working-directory: linuxdoom-1.10
      run: |
        mkdir -p ../dist/wasm

        SRCS=$(ls *.c | grep -vE '^(i_video|i_sound|i_system|i_main|i_net)\.c$' | tr '\n' ' ')
        SRCS="$SRCS web/i_video_web.c web/i_sound_web.c web/i_system_web.c web/i_net_stub.c web/i_main_web.c"

        echo "Compiling: $SRCS"
        echo "---"

        emcc $SRCS \
          -o ../dist/wasm/doom.js \
          -O1 \
          -DNORMALUNIX -DLINUX \
          -s WASM=1 \
          -s MODULARIZE=1 \
          -s EXPORT_NAME="createDoom" \
          -s INITIAL_MEMORY=33554432 \
          -s ALLOW_MEMORY_GROWTH=1 \
          -s EXPORTED_FUNCTIONS='["_initGame","_tickGame","_reportKeyDown","_reportKeyUp"]' \
          -s EXPORTED_RUNTIME_METHODS='["ccall","cwrap"]' \
          -s NO_EXIT_RUNTIME=1 \
          -s ENVIRONMENT=web \
          --no-entry \
          2>&1

        echo "=== Output files ==="
        ls -lh ../dist/wasm/ || echo "No output!"

    - name: Copy frontend
      run: |
        cp index.html manifest.json dist/ 2>/dev/null || true
        cp -r styles src dist/ 2>/dev/null || true

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/deploy-pages@v4
      id: deployment
