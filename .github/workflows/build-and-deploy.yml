name: Build DOOM WASM & Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages:    write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Cache Emscripten SDK
      id: cache-emsdk
      uses: actions/cache@v4
      with:
        path: emsdk
        key: emsdk-3.1.51

    - name: Install Emscripten SDK
      if: steps.cache-emsdk.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/emscripten-core/emsdk.git
        ./emsdk/emsdk install 3.1.51
        ./emsdk/emsdk activate 3.1.51

    - name: Add emcc to PATH
      run: echo "$GITHUB_WORKSPACE/emsdk/upstream/emscripten" >> $GITHUB_PATH

    - name: Download Freedoom WAD
      run: |
        mkdir -p dist/assets
        curl -sL "https://github.com/freedoom/freedoom/releases/download/v0.13.0/freedoom-0.13.0.zip" -o freedoom.zip
        unzip -j freedoom.zip "*/freedoom1.wad" -d dist/assets/

    - name: Compile DOOM → WASM
      working-directory: linuxdoom-1.10
      run: |
        mkdir -p ../dist/wasm

        PORTABLE=$(ls *.c | grep -vE '^(i_video|i_sound|i_system|i_main|i_net)\.c$' | tr '\n' ' ')
        WEB="web/i_video_web.c web/i_sound_web.c web/i_system_web.c web/i_net_stub.c web/i_main_web.c web/d_loop_web.c"

        emcc $PORTABLE $WEB \
          -o ../dist/wasm/doom.js \
          -O1 \
          -DNORMALUNIX -DLINUX -DSNDSERV -DSNDINTR \
          -s WASM=1 \
          -s MODULARIZE=1 \
          -s EXPORT_NAME="createDoom" \
          -s INITIAL_MEMORY=33554432 \
          -s ALLOW_MEMORY_GROWTH=1 \
          -s EXPORTED_FUNCTIONS='["_initGame","_tickGame","_reportKeyDown","_reportKeyUp"]' \
          -s EXPORTED_RUNTIME_METHODS='["ccall","cwrap"]' \
          -s NO_EXIT_RUNTIME=1 \
          -s ENVIRONMENT=web \
          -s ERROR_ON_UNDEFINED_SYMBOLS=0 \
          -Wl,--allow-multiple-definition \
          --no-entry \
          2>&1 | tee /tmp/build_output.txt || true

        echo "=== ERRORS ==="
        grep -i "error\|undefined" /tmp/build_output.txt | head -30 || echo "No errors found in grep"
        echo "=== OUTPUT FILES ==="
        ls -lh ../dist/wasm/ 2>/dev/null || echo "No output!"
        test -f ../dist/wasm/doom.wasm && echo "SUCCESS: doom.wasm exists!" || { echo "FAILED: doom.wasm missing"; exit 1; }

    - name: Copy frontend
      if: success()
      run: |
        cp index.html manifest.json dist/ 2>/dev/null || true
        cp -r styles src dist/ 2>/dev/null || true

    - name: Upload Pages artifact
      if: success()
      uses: actions/upload-pages-artifact@v3
      with:
        path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/deploy-pages@v4
      id: deployment
