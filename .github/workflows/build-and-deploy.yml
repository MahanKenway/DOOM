name: Build DOOM WASM & Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write
  pages:    write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Cache Emscripten SDK
      id: cache-emsdk
      uses: actions/cache@v4
      with:
        path: emsdk
        key: emsdk-3.1.51

    - name: Install Emscripten SDK
      if: steps.cache-emsdk.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/emscripten-core/emsdk.git
        ./emsdk/emsdk install 3.1.51
        ./emsdk/emsdk activate 3.1.51

    - name: Add emcc to PATH
      run: echo "$GITHUB_WORKSPACE/emsdk/upstream/emscripten" >> $GITHUB_PATH

    - name: Download Freedoom WAD
      run: |
        mkdir -p dist/assets
        curl -sL "https://github.com/freedoom/freedoom/releases/download/v0.13.0/freedoom-0.13.0.zip" -o freedoom.zip
        unzip -j freedoom.zip "*/freedoom1.wad" -d dist/assets/
        test -f dist/assets/freedoom1.wad || { echo "FATAL: freedoom1.wad missing"; exit 1; }

    - name: Patch source files
      working-directory: linuxdoom-1.10
      run: python3 patch_web.py

    - name: Compile DOOM -> WASM
      working-directory: linuxdoom-1.10
      run: |
        mkdir -p ../dist/wasm
        PORTABLE=$(ls *.c | grep -vE '^(i_video|i_sound|i_system|i_main|i_net)\.c$' | tr '\n' ' ')
        WEB="web/i_video_web.c web/i_sound_web.c web/i_system_web.c web/i_net_stub.c web/i_main_web.c web/w_io_web.c"

        emcc $PORTABLE $WEB \
          -o ../dist/wasm/doom.wasm \
          -O2 -w -I. \
          -DNORMALUNIX \
          -s WASM=1 \
          -s STANDALONE_WASM=1 \
          -s INITIAL_MEMORY=33554432 \
          -s ALLOW_MEMORY_GROWTH=1 \
          -s EXPORTED_FUNCTIONS='["_initGame","_tickGame","_reportKeyDown","_reportKeyUp"]' \
          -s ERROR_ON_UNDEFINED_SYMBOLS=0 \
          --no-entry

        test -f ../dist/wasm/doom.wasm || { echo "FATAL: doom.wasm not produced"; exit 1; }
        ls -lh ../dist/wasm/doom.wasm

    - name: Copy frontend files
      run: |
        cp index.html manifest.json dist/ 2>/dev/null || true
        cp -r styles src dist/ 2>/dev/null || true
        mkdir -p dist/assets
        cp -n assets/* dist/assets/ 2>/dev/null || true

    - name: Cache-bust WAD/WASM URLs with commit SHA
      run: |
        SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-8)
        sed -i "s#assets/freedoom1\\.wad#assets/freedoom1.wad?v=${SHA_SHORT}#" dist/src/main.js
        sed -i "s#wasm/doom\\.wasm#wasm/doom.wasm?v=${SHA_SHORT}#" dist/src/main.js

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/deploy-pages@v4
      id: deployment
