name: Build DOOM WASM & Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write
  pages:    write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Cache Emscripten SDK
      id: cache-emsdk
      uses: actions/cache@v4
      with:
        path: emsdk
        key: emsdk-3.1.51

    - name: Install Emscripten SDK
      if: steps.cache-emsdk.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/emscripten-core/emsdk.git
        ./emsdk/emsdk install 3.1.51
        ./emsdk/emsdk activate 3.1.51

    - name: Add emcc to PATH
      run: echo "$GITHUB_WORKSPACE/emsdk/upstream/emscripten" >> $GITHUB_PATH

    - name: Download Freedoom WAD
      run: |
        mkdir -p dist/assets
        curl -sL "https://github.com/freedoom/freedoom/releases/download/v0.13.0/freedoom-0.13.0.zip" -o freedoom.zip
        unzip -j freedoom.zip "*/freedoom1.wad" -d dist/assets/

    - name: Patch source files for web/wasm build
      working-directory: linuxdoom-1.10
      run: |
        python3 << 'PYEOF'
        import re, sys

        # ‚îÄ‚îÄ Patch 1: d_main.c ‚Äî replace blocking D_DoomLoop ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
        with open('d_main.c') as f: src = f.read()
        stub = ('void D_DoomLoop (void)\n{\n'
                '    if (demorecording) G_BeginRecording ();\n'
                '    I_InitGraphics ();\n}\n')
        patched = re.sub(r'void D_DoomLoop \(void\)\s*\{.*?\n\}\n',
                         stub, src, count=1, flags=re.DOTALL)
        if patched == src: print('ERROR: D_DoomLoop not found'); sys.exit(1)
        with open('d_main.c', 'w') as f: f.write(patched)
        print('‚úÖ d_main.c: D_DoomLoop stubbed')

        # ‚îÄ‚îÄ Patch 2: m_misc.c ‚Äî chatmacro string-ptr defaults ‚Üí 0 ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
        with open('m_misc.c') as f: src = f.read()
        src = re.sub(
            r'\{("chatmacro\d+"),\s*\(int\s*\*\)\s*&chat_macros\[(\d+)\],\s*\(int\)\s*\w+\s*\}',
            r'{"\1", (int *) &chat_macros[\2], 0}', src)
        with open('m_misc.c', 'w') as f: f.write(src)
        print('‚úÖ m_misc.c: chatmacro defaults = 0')

        # ‚îÄ‚îÄ Patch 3: am_map.c ‚Äî add missing 'int' type specifiers ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
        # Emscripten/clang rejects implicit int (valid C89, invalid C99+)
        with open('am_map.c') as f: src = f.read()

        fixes = [
            # static nexttic = 0  ‚Üí  static int nexttic = 0
            (r'\bstatic\s+nexttic\s*=', 'static int nexttic ='),
            # register outcode1 = 0  ‚Üí  register int outcode1 = 0
            (r'\bregister\s+outcode1\s*=', 'register int outcode1 ='),
            (r'\bregister\s+outcode2\s*=', 'register int outcode2 ='),
            # register outside;  ‚Üí  register int outside;
            (r'\bregister\s+outside\s*;', 'register int outside;'),
            # static fuck = 0  ‚Üí  static int fuck = 0
            (r'\bstatic\s+fuck\s*=', 'static int fuck ='),
        ]

        for pattern, replacement in fixes:
            src = re.sub(pattern, replacement, src)

        with open('am_map.c', 'w') as f: f.write(src)
        print('‚úÖ am_map.c: 5 implicit-int declarations fixed')
        PYEOF

    - name: Compile DOOM ‚Üí WASM
      working-directory: linuxdoom-1.10
      run: |
        mkdir -p ../dist/wasm

        PORTABLE=$(ls *.c | grep -vE '^(i_video|i_sound|i_system|i_main|i_net)\.c$' | tr '\n' ' ')
        WEB="web/i_video_web.c web/i_sound_web.c web/i_system_web.c web/i_net_stub.c web/i_main_web.c"

        set +e
        emcc $PORTABLE $WEB \
          -o ../dist/wasm/doom.js \
          -O2 -w \
          -DNORMALUNIX \
          -s WASM=1 \
          -s MODULARIZE=1 \
          -s EXPORT_NAME="createDoom" \
          -s INITIAL_MEMORY=33554432 \
          -s ALLOW_MEMORY_GROWTH=1 \
          -s EXPORTED_FUNCTIONS='["_initGame","_tickGame","_reportKeyDown","_reportKeyUp"]' \
          -s EXPORTED_RUNTIME_METHODS='["ccall","cwrap"]' \
          -s NO_EXIT_RUNTIME=1 \
          -s ENVIRONMENT=web \
          -s ERROR_ON_UNDEFINED_SYMBOLS=0 \
          --no-entry \
          > ../build.log 2>&1
        BUILD_EXIT=$?
        set -e

        tail -20 ../build.log

        git config user.email "ci@github.com"
        git config user.name "GitHub Actions"
        git add ../build.log
        git commit -m "ci: build log [skip ci]" || true
        git push || true

        test $BUILD_EXIT -eq 0 \
          && { ls -lh ../dist/wasm/; echo "‚úÖ doom.wasm BUILT!"; } \
          || { echo "‚ùå FAILED (exit=$BUILD_EXIT)"; exit 1; }

    - name: Copy frontend files
      if: success()
      run: |
        cp index.html manifest.json dist/ 2>/dev/null || true
        cp -r styles src dist/ 2>/dev/null || true

    - name: Upload Pages artifact
      if: success()
      uses: actions/upload-pages-artifact@v3
      with:
        path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/deploy-pages@v4
      id: deployment
